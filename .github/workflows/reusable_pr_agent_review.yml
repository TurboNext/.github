name: Reusable PR Agent

on:
  workflow_call:
    secrets:
      LITELLM_API_BASE:
        required: true
      LITELLM_VIRTUAL_KEY:
        required: true

permissions:
  pull-requests: write
  issues: write
  contents: write

jobs:
  pr_agent:
    name: PR Agent
    runs-on: ubuntu-latest
    steps:
      - name: PR Agent action step
        id: pragent
        uses: the-pr-agent/pr-agent@v0.37.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI.KEY: ${{ secrets.LITELLM_VIRTUAL_KEY }}
          OPENAI.API_BASE: ${{ secrets.LITELLM_API_BASE }}

          config.model: "openai/${{ vars.PR_AGENT_MODEL }}"
          # ZDR safety: fallback locked to the same proxy alias
          config.fallback_models: '["openai/${{ vars.PR_AGENT_MODEL }}"]'
          config.custom_model_max_tokens: "1048576"

          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "false"
          github_action_config.auto_improve: "true"
          github_action_config.pr_actions: '["labeled"]'
          pr_code_suggestions.commitable_code_suggestions: "true"

name: Validate Pull Request

on:
  workflow_call:

jobs:
  validate:
    name: Validate PR Description and linked issue
    runs-on: ubuntu-latest
    steps:
      - name: Checkout .github repository
        uses: actions/checkout@v6.0.2
        with:
          repository: TurboNext/.github
          ref: main
          token: ${{ github.token }}
          persist-credentials: false

      - name: Verify checkout
        run: ls -la .github/workflows/scripts/

      - name: Check PR description
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            const { validatePr } = require('./.github/workflows/scripts/validate_pr.js');
            await validatePr({ github, context, core });

      - name: Check PR labels
        uses: actions/github-script@v8
        with:
          github-token: ${{ github.token }}
          script: |
            const script = require('./.github/workflows/scripts/check_labels.js');
            await script({ github, context, core });

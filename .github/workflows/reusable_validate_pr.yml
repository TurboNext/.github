name: Validate Pull Request

on:
  workflow_call:

jobs:
  validate:
    name: Validate PR Description and linked issue
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2


      - name: Check PR description
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GHP_TOKEN }}
          script: |
            const { validatePr } = require('TurboNext/.github/.github/workflows/scripts/validate_pr.js@main');
            await validatePr({ github, context, core });

      - name: Check PR labels
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GHP_TOKEN }}
          script: |
            const script = require('TurboNext/.github/.github/workflows/scripts/check_labels.js@main');
            await script({ github, context, core });
